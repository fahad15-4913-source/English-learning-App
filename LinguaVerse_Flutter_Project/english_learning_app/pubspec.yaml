name: english_learning_app
description: Interactive, automated English learning platform with 3D visualization.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_analytics: ^10.8.0

  # State Management
  provider: ^6.1.1

  # UI & Animation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2
  confetti: ^0.7.0

  # 3D Visualization
  vector_math: ^2.1.4

  # Audio & Speech
  audioplayers: ^6.0.0
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.2

  # Utilities
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
